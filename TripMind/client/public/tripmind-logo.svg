<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <!-- Globe shine -->
    <radialGradient id="globeShine" cx="38%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#5B9BFF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:0" />
    </radialGradient>
    <!-- Gold gradient for pin -->
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D" />
      <stop offset="100%" style="stop-color:#F59E0B" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000033"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
    <!-- Clip circle -->
    <clipPath id="circleClip">
      <circle cx="200" cy="185" r="118"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="400" height="400" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern overlay -->
  <rect width="400" height="400" rx="80" ry="80" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.06"/>

  <!-- Decorative corner dots -->
  <circle cx="52" cy="52" r="5" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="348" cy="52" r="5" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="52" cy="348" r="5" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="348" cy="348" r="5" fill="#FFFFFF" opacity="0.12"/>

  <!-- Globe circle base -->
  <circle cx="200" cy="185" r="118" fill="#163059" filter="url(#shadow)"/>
  <circle cx="200" cy="185" r="118" fill="url(#globeShine)"/>

  <!-- Globe outline -->
  <circle cx="200" cy="185" r="118" fill="none" stroke="#3B82F6" stroke-width="2.5" opacity="0.7"/>

  <!-- Globe latitude lines (clipped) -->
  <g clip-path="url(#circleClip)" opacity="0.35">
    <ellipse cx="200" cy="185" rx="118" ry="30" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
    <ellipse cx="200" cy="185" rx="118" ry="70" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
    <line x1="82" y1="185" x2="318" y2="185" stroke="#60A5FA" stroke-width="1.5"/>
    <line x1="200" y1="67" x2="200" y2="303" stroke="#60A5FA" stroke-width="1.5"/>
    <!-- Diagonal longitude -->
    <ellipse cx="200" cy="185" rx="60" ry="118" fill="none" stroke="#60A5FA" stroke-width="1.5"/>
  </g>

  <!-- Plane icon centered on globe -->
  <g transform="translate(200, 172) rotate(-30)" filter="url(#softShadow)">
    <!-- Plane body -->
    <ellipse cx="0" cy="0" rx="30" ry="9" fill="#FFFFFF"/>
    <!-- Plane nose -->
    <polygon points="30,0 44,-4 44,4" fill="#FFFFFF"/>
    <!-- Wings -->
    <polygon points="-5,-9 18,-9 10,9 -5,9" fill="#E0EEFF" opacity="0.9"/>
    <!-- Tail -->
    <polygon points="-25,-9 -14,-9 -14,0 -25,0" fill="#E0EEFF" opacity="0.9"/>
    <!-- Window row -->
    <circle cx="-2" cy="0" r="3" fill="#2563EB" opacity="0.7"/>
    <circle cx="8" cy="0" r="3" fill="#2563EB" opacity="0.7"/>
    <circle cx="18" cy="0" r="3" fill="#2563EB" opacity="0.7"/>
  </g>

  <!-- Map pin on globe (top-right area) -->
  <g transform="translate(268, 118)" filter="url(#softShadow)">
    <path d="M0,-22 C-12,-22 -22,-12 -22,0 C-22,16 0,36 0,36 C0,36 22,16 22,0 C22,-12 12,-22 0,-22 Z" fill="url(#pinGrad)"/>
    <circle cx="0" cy="0" r="8" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#F59E0B"/>
  </g>

  <!-- Dashed travel path arc on globe -->
  <path d="M 120 210 Q 160 130 240 160 Q 280 175 290 230"
        fill="none" stroke="#FCD34D" stroke-width="2.5"
        stroke-dasharray="6,5" opacity="0.7"/>

  <!-- Destination dot at path end -->
  <circle cx="290" cy="230" r="5" fill="#FCD34D" opacity="0.9"/>
  <circle cx="290" cy="230" r="9" fill="none" stroke="#FCD34D" stroke-width="1.5" opacity="0.5"/>

  <!-- Origin dot at path start -->
  <circle cx="120" cy="210" r="4" fill="#93C5FD" opacity="0.8"/>

  <!-- App name -->
  <text x="200" y="342"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="42"
        font-weight="800"
        letter-spacing="-1.5"
        text-anchor="middle"
        fill="#FFFFFF">
    Trip<tspan fill="#FCD34D">Mind</tspan>
  </text>

  <!-- Tagline -->
  <text x="200" y="368"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13"
        font-weight="400"
        letter-spacing="3.5"
        text-anchor="middle"
        fill="#93C5FD"
        opacity="0.85">
    AI TRAVEL PLANNER
  </text>

</svg>
